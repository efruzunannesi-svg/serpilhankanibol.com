<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Serpilhan Kanıbol | Yazı Terapisi</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1A237E;
            font-family: 'Segoe UI', 'Roboto', 'Georgia', serif;
            padding: 1.5rem 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .site-card {
            max-width: 1200px;
            width: 100%;
            background-color: #F5F5DC;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        .site-header {
            background-color: #2d0a3d;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 4px solid #C5A059;
        }
        .site-title {
            font-size: 1.9rem;
            font-weight: 700;
            color: #F5F5DC;
            font-family: 'Times New Roman', serif;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 #1A237E;
        }
        .logo-area {
            width: 100px; height: 100px;
            background-color: #F5F5DC;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-area img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        /* SLIDER */
        .slider-box {
            position: relative; width: 100%; height: 400px;
            overflow: hidden; background: #2d0a3d;
            border-bottom: 2px solid #C5A059;
        }
        .slider-track {
            display: flex; height: 100%;
            transition: transform 0.5s ease;
        }
        .slider-track img {
            min-width: 100%; height: 100%;
            object-fit: cover;
        }
        .slider-arrow {
            position: absolute; top: 50%;
            transform: translateY(-50%);
            background: rgba(20,10,30,0.6); color: #F5F5DC;
            border: 1px solid #C5A059;
            font-size: 22px; cursor: pointer;
            padding: 12px 18px; border-radius: 50%;
            z-index: 10; transition: 0.3s;
        }
        .slider-arrow:hover { background: #C5A059; color: #2d0a3d; }
        .slider-arrow.left { left: 20px; }
        .slider-arrow.right { right: 20px; }
        .slider-dots {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; z-index: 10;
        }
        .slider-dots span {
            display: inline-block; width: 10px; height: 10px;
            margin: 0 5px; background: rgba(255,255,255,0.4);
            border-radius: 50%; cursor: pointer;
        }
        .slider-dots span.active { background: #C5A059; }

        .nav-row {
            background-color: #F5F5DC;
            padding: 0.9rem 1.5rem; display: flex;
            flex-wrap: wrap; gap: 0.8rem;
            justify-content: center;
            border-bottom: 2px solid #C5A059;
        }
        .nav-btn {
            background-color: #2d0a3d; color: #F5F5DC;
            border: 1px solid #C5A059;
            padding: 0.6rem 1.3rem; border-radius: 40px;
            font-weight: bold; font-size: 0.85rem;
            letter-spacing: 1px; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .nav-btn:hover, .nav-btn.active {
            background-color: #C5A059; color: #2d0a3d;
            border-color: #2d0a3d; transform: translateY(-2px);
        }
        .content-pane {
            padding: 2rem; background-color: #F5F5DC;
            color: #2d0a3d; line-height: 1.7; min-height: 65vh;
        }
        .content-pane h2, .content-pane h3 {
            border-left: 5px solid #C5A059;
            padding-left: 1rem; margin: 1.8rem 0 1rem 0;
            font-family: 'Times New Roman', serif; font-weight: 700;
        }
        .content-pane h2:first-of-type { margin-top: 0; }
        .content-pane p { margin-bottom: 1rem; }
        details {
            background: #ffffffea; border: 1px solid #C5A059;
            border-radius: 18px; margin: 1.2rem 0; padding: 0.5rem 0.8rem;
        }
        details summary {
            font-weight: bold; font-size: 1.3rem; color: #2d0a3d;
            cursor: pointer; list-style: none;
            display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0;
        }
        details summary::before { content: "📖"; font-size: 1.4rem; }
        details[open] summary::before { content: "📂"; }
        .signature-quote {
            font-style: italic; border-left: 3px solid #C5A059;
            padding-left: 1.2rem; margin: 1rem 0; color: #3c2a4d;
        }
        .contact-info {
            background: #2d0a3d10; padding: 1rem;
            border-radius: 20px; margin-top: 1rem;
        }
        .site-footer {
            background-color: #4a4a4a; color: #d4d4d4;
            text-align: center; padding: 1rem; font-size: 0.8rem;
            border-top: 2px solid #C5A059;
        }
        @media (max-width: 700px) {
            .site-header { flex-direction: column; text-align: center; padding: 1rem; }
            .site-title { font-size: 1.5rem; }
            .logo-area { width: 80px; height: 80px; }
            .slider-box { height: 250px; }
            .slider-arrow { padding: 8px 14px; font-size: 18px; }
            .nav-row { gap: 0.5rem; padding: 0.8rem; }
            .nav-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
            .content-pane { padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="site-card">
    <div class="site-header">
        <div class="site-title">SERPİLHAN KANIBOL</div>
        <div class="logo-area">
            <img src="favicon.png" alt="Logo" onerror="this.style.display='none'">
        </div>
    </div>

    <!-- SLIDER -->
    <div class="slider-box" id="heroSlider">
        <div class="slider-track" id="heroTrack"></div>
        <button class="slider-arrow left" id="heroPrev">❮</button>
        <button class="slider-arrow right" id="heroNext">❯</button>
        <div class="slider-dots" id="heroDots"></div>
    </div>

    <div class="nav-row" id="navMenu">
        <button class="nav-btn active" data-page="anasayfa">ANA SAYFA</button>
        <button class="nav-btn" data-page="yazimatolyesi">YAZIM ATÖLYESİ</button>
        <button class="nav-btn" data-page="makaleler">MAKALELER</button>
        <button class="nav-btn" data-page="magaza">MAĞAZA</button>
        <button class="nav-btn" data-page="iletisim">İLETİŞİM</button>
    </div>
    <main class="content-pane" id="mainContent"></main>
    <footer class="site-footer">
        <span>© Serpilhan Kanıbol 2026 — Kelimelerle bağlan</span>
    </footer>
</div>

<script>
    // SAYFA İÇERİKLERİ
    const anasayfaHTML = `<h2>Yazı Terapisi</h2><p style="font-size:1.2rem;"><em>Terapötik Yazma Eğitmeni</em></p><p style="font-size:1.3rem;color:#C5A059;">✨ Kelimelerle yeniden bağlan</p><h3>Serpilhan KANIBOL kimdir?</h3><p>Serpilhan Kanıbol pek çok alanda yazım çalışmaları yapmış, yazım atölyesi eğitimleri vermiş, yazı dilinde pek çok şeyin çözülebileceğine inanan o kişidir.</p><p><strong>Sosyal Hizmet Uzmanı</strong> kimliğiyle insanın iç dünyasını anlamayı, <strong>İletişim Fakültesi ve Radyo Sinema TV</strong> eğitimiyle de bu anladıklarını etkili bir anlatıma dönüştürmeyi öğrenmiştir.</p><p>İnsan hayata çevresiyle başlar. Çevresiyle şekillenir. İnsan bir nevi çevresinin eseridir. Ama insan kendini tanımaya kelimelerle başlar.</p><p>Serpilhan KANIBOL yazının gücünü insanın en üstün güçlerinden biri olarak görür. Yazmak en iyi terapi yöntemlerinden biridir.</p><div class="signature-quote">✍️ Ne yazmak istiyorsunuz?<br>📖 Nasıl yazmak istiyorsunuz?<br>🎯 Nasıl bir kitle için yazmak istiyorsunuz?</div>`;

    const yazimAtolyesiHTML = `<h2>Yazım Atölyesi</h2><p>Yazım Atölyesi sizin kendi ayağınızla geldiğiniz ancak kalbinizi ikna ettiğinizde gidebileceğiniz eğitimlerden oluşur.</p><details><summary>TİYATRO</summary><p>Tiyatro, sinema ve televizyon projeleri için metin temeldir. Yazar yazdığının arkasında duracak kadar sağlam bir kalem taşımalıdır.</p></details><details><summary>SİNEMA</summary><p>Beyaz Perde. Senaristin zihninde oluşan o muhteşem sanat.</p></details><details><summary>EDEBİYAT</summary><p>Deneme · Hikâye · Roman · Makale türlerinde eserler çıkarmak için yolu birlikte yürüyoruz.</p></details>`;

    const makalelerHTML = `<h2>Makaleler</h2><h3>İçimde Bir Deniz Var, Köpürüp Duruyor.</h3><p>Çocuklarımızla iletişim kurmak her geçen gün daha karmaşık bir hal alıyor.</p><p>Çocuğumuz içindeki denizin köpüklerinden endişeleniyorsa ona boş bir kâğıt verelim. Yazmayı öğütleyelim çocuklarımıza.</p>`;

    const magazaHTML = `<h2>Mağaza</h2><p>Yakında dijital yazı atölyeleri, rehber kitaplar ve yaratıcı yazı defterleri burada olacak.</p>`;

    const iletisimHTML = `<h2>İletişim</h2><div class="contact-info"><p>📧 <strong>E-posta:</strong> umudarota@hotmail.com</p></div>`;

    const pages = {
        anasayfa: anasayfaHTML,
        yazimatolyesi: yazimAtolyesiHTML,
        makaleler: makalelerHTML,
        magaza: magazaHTML,
        iletisim: iletisimHTML
    };

    function renderPage(pageId) {
        document.getElementById("mainContent").innerHTML = pages[pageId] || "<p>Sayfa bulunamadı.</p>";
        document.querySelectorAll(".nav-btn").forEach(function(btn) {
            btn.classList.toggle("active", btn.getAttribute("data-page") === pageId);
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.querySelectorAll(".nav-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
            renderPage(this.getAttribute("data-page"));
        });
    });

    renderPage("anasayfa");

    // SLIDER
    (function() {
        var track = document.getElementById("heroTrack");
        var dots = document.getElementById("heroDots");
        if (!track || !dots) return;

        var images = [
            "serpilhan-kanibol-kanli-postal-film-seti.png.png",
            "serpilhan-kanibol-devlet-tiyatrolari-60-yil.png.png",
            "serpilhan-kanibol-yaratici-drama-egitimi.png.png",
            "serpilhan-kanibol-oyuncu-film-seti.png.png",
            "serpilhan-kanibol-tiyatro-sahnesi-oyun.png.png"
        ];
        var current = 0;

        images.forEach(function(src, i) {
            var img = document.createElement("img");
            img.src = src;
            img.alt = "Serpilhan Kanıbol";
            track.appendChild(img);

            var dot = document.createElement("span");
            if (i === 0) dot.className = "active";
            dot.onclick = function() { goTo(i); };
            dots.appendChild(dot);
        });

        function goTo(i) {
            current = i;
            track.style.transform = "translateX(-" + (current * 100) + "%)";
            dots.querySelectorAll("span").forEach(function(d, idx) { d.className = (idx === i) ? "active" : ""; });
        }

        document.getElementById("heroPrev").onclick = function() { current = (current - 1 + images.length) % images.length; goTo(current); };
        document.getElementById("heroNext").onclick = function() { current = (current + 1) % images.length; goTo(current); };

        var box = document.getElementById("heroSlider"), startX = 0;
        box.addEventListener("touchstart", function(e) { startX = e.touches[0].clientX; });
        box.addEventListener("touchend", function(e) {
            var diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) { diff > 0 ? document.getElementById("heroNext").click() : document.getElementById("heroPrev").click(); }
        });

        goTo(0);
    })();
</script>
</body>
</html>
